default_install_hook_types: [pre-commit, pre-push]
# Exclude Harbor task assets from linting
exclude: ^environments/.*/tasks/

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: sync-agents-md
        name: Sync AGENTS.md from docs
        entry: uv run python scripts/sync.py
        language: system
        files: ^(docs/environments\.md|assets/agents/.*\.md|scripts/sync\.py)$
        pass_filenames: false
      - id: ty
        name: ty (ci parity)
        entry: uv run --python 3.13 ty check verifiers
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: lint-agent
        name: lint-agent
        entry: bash -c 'SKILL="$(git rev-parse --show-toplevel)/../../Planning/.agents/skills/lint-agent/SKILL.md"; [ -f "$SKILL" ] || exit 0; for f in "$@"; do [ -f "$f" ] || continue; OUT=$(claude --print "$(cat $SKILL)" "$(cat $f)" 2>/dev/null); echo "$OUT"; echo "$OUT" | grep -q "^.*\[HIGH\]" && exit 1; done; exit 0' --
        language: system
        types_or: [python, pyi]
        pass_filenames: true
      - id: oo-agent
        name: oo-agent
        entry: bash -c '[ -n "$SKIP_OO_CHECK" ] && exit 0; SKILL="$(git rev-parse --show-toplevel)/../../Planning/.agents/skills/oo-agent/SKILL.md"; [ -f "$SKILL" ] || exit 0; for f in "$@"; do [ -f "$f" ] || continue; OUT=$(claude --print "$(cat $SKILL)" "$(cat $f)" 2>/dev/null); echo "$OUT"; echo "$OUT" | grep -q "^FAIL:" && exit 1; done; exit 0' --
        language: system
        types_or: [python, pyi]
        files: ^environments/
        pass_filenames: true
