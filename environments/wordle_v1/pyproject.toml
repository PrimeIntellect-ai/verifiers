[project]
name = "wordle-v1"
version = "0.1.0"
description = "Wordle — the textarena taskset pinned to Wordle-v0."
requires-python = ">=3.10"
dependencies = ["verifiers[textarena]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wordle_v1"]
