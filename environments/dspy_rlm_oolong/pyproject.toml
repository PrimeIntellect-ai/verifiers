[project]
name = "dspy-rlm-oolong"
description = "ApiEnv environment using DSPy's RLM module on Oolong long-context benchmark"
tags = ["api-env", "multi-turn", "dspy", "rlm", "long-context", "oolong"]
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "datasets",
    "dspy>=2.6.27",
    "python-dateutil>=2.9",
    "verifiers>=0.1.12.dev3",
    "openai",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["dspy_rlm_oolong.py", "pyproject.toml"]
