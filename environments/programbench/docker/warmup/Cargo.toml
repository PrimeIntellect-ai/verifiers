[package]
name = "warmup"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
regex = "1"
thiserror = "1"

[[bin]]
name = "warmup"
path = "src/main.rs"
