[project]
name = "glossary-v1"
version = "0.2.0"
description = "glossary-v1 — task-specific tools via a vf-native Toolset class."
requires-python = ">=3.10"
dependencies = ["verifiers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["glossary_v1"]

