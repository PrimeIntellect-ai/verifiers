[project]
name = "twenty-questions-v2"
description = "20 Questions using new TaskSet/Harness/Agent/GameProtocol abstractions"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["verifiers>=0.1.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["twenty_questions_v2.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
