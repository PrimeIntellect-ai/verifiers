[project]
name = "ultimatum-game"
description = "Ultimatum Game: two-agent negotiation with asymmetric incentives"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["verifiers>=0.1.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["ultimatum_game.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
