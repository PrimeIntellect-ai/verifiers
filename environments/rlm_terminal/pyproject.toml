[project]
name = "rlm-terminal"
version = "0.1.0"
description = "RLM harness on Terminal-Lego through experimental composable tasksets"
license = "MIT"
tags = ["eval", "cli-agent", "rlm", "terminal-lego"]
requires-python = ">=3.11"
dependencies = [
    "verifiers",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "rlm_terminal.py",
    "README.md",
    "pyproject.toml",
    "data/**/*",
]

[project.entry-points."verifiers.environments"]
rlm_terminal = "rlm_terminal:load_environment"

[tool.verifiers.eval]
num_examples = 1
rollouts_per_example = 1

[tool.uv.sources]
verifiers = { path = "../..", editable = true }
