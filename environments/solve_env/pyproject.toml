[project]
name = "solve-env"
version = "0.1.0"
description = "LLM-free golden-patch validation for any SandboxTaskSet"
tags = ["validation", "sandbox", "no-llm", "eval"]
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.13.dev9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["solve_env.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 30
rollouts_per_example = 1
