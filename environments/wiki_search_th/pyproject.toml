[project]
name = "wiki-search-th"
description = "Taskset/harness migration of wiki-search."
tags = ["wikipedia", "multi-turn", "agentic-search", "rag", "train", "eval", "llm-judge", "taskset-harness"]
requires-python = ">=3.11"
version = "0.1.0"
dependencies = [
    "verifiers>=0.1.9",
    "chromadb",
    "datasets",
    "openai",
    "opentelemetry-api>=1.41.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["wiki_search_th.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 10
rollouts_per_example = 2
