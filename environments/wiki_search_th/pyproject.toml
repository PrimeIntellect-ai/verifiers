[project]
name = "wiki-search-th"
description = "v1 taskset/harness wiki-search toolset example."
tags = ["wikipedia", "toolset", "rag", "taskset-harness"]
requires-python = ">=3.11"
version = "0.1.0"
dependencies = [
    "verifiers>=0.1.13.dev0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["wiki_search_th.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 10
rollouts_per_example = 2
