[project]
name = "harbor-v1"
description = "Generic v1 Harbor taskset environment"
license = "MIT"
tags = ["eval", "cli_agent", "v1", "harbor", "taskset", "harness"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.10.dev4",
    "harnesses>=0.1.2",
    "tasksets>=0.1.1",
    "prime-sandboxes>=0.2.10",
    "tomli>=2.3.0",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["harbor_v1/**/*", "README.md", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 1
rollouts_per_example = 1

[tool.ruff]
exclude = ["harbor_v1/tasks/**"]
