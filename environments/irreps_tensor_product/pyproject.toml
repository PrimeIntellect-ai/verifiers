[project]
name = "irreps-tensor-product"
version = "0.1.0"
description = "Standalone O(3) irreps tensor product environment with exact scoring"
tags = ["math", "representation-theory", "single-turn", "eval"]
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.8.post0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["irreps_tensor_product.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
