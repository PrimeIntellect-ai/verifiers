[project]
name = "kuhn-poker-v1"
version = "0.1.0"
description = "kuhn-poker-v1 — seeded Kuhn poker self-play, two seats driven turn-by-turn over interactions."
requires-python = ">=3.11"
dependencies = ["verifiers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kuhn_poker_v1"]
