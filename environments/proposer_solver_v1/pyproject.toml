[project]
name = "proposer-solver-v1"
version = "0.1.0"
description = "proposer-solver-v1 — a proposer makes an AIME 2026 problem harder and a solver panel attempts it."
requires-python = ">=3.10"
dependencies = ["verifiers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["proposer_solver_v1"]
