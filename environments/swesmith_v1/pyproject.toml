[project]
name = "swesmith-v1"
version = "0.1.0"
description = "swesmith-v1 - SWE-Smith multilingual issue-resolving tasks (agentic; sandbox SWE-Smith reward)."
requires-python = ">=3.10"
dependencies = ["datasets", "swesmith", "swebench"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["swesmith_v1.py", "pyproject.toml"]
