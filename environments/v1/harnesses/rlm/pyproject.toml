[project]
name = "rlm-harness"
version = "0.2.0"
tags = ["harness", "rlm", "sandbox", "v1"]
license = "Apache-2.0"
description = "RLM harness packaged as an installable v1 module. Wraps verifiers.v1.packages.harnesses:RLM with a load_harness factory."
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.15.dev11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["rlm.py", "pyproject.toml", "README.md"]
