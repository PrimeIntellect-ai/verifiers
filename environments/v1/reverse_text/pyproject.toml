[project]
name = "reverse-text"
version = "0.2.0"
tags = ["text", "transformation", "single-turn", "xml", "v1", "taskset"]
license = "Apache-2.0"
description = "Reverse a given text; pure v1 taskset, evaluated by LCS similarity between the parsed answer and ground-truth reversal."
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.15.dev11",
    "datasets",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["reverse_text.py", "pyproject.toml", "README.md"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
