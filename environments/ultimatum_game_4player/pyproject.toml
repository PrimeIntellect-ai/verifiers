[project]
name = "ultimatum-game-4player"
description = "Ultimatum Game (4-player): 4 actors across 2 models for multi-model multi-LoRA testing"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["verifiers>=0.1.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["ultimatum_game_4player.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
