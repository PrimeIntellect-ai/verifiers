[project]
name = "ethics-debate"
version = "0.1.0"
description = "Multi-agent ethics debate: arguer vs critic with LLM judge"
tags = ["ethics", "multi-agent", "debate", "llm-judge", "train", "eval"]
dependencies = [
    "verifiers>=0.1.11.dev0",
    "datasets",
    "openai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["ethics_debate.py", "README.md"]

[tool.verifiers.eval]
num_examples = 3
rollouts_per_example = 1
