[project]
name = "opencode-harbor-th"
description = "v1 taskset/harness sketch for OpenCode on Harbor tasks."
license = "MIT"
tags = ["eval", "cli_agent", "harbor", "taskset-harness"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.13.dev0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["opencode_harbor_th.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
