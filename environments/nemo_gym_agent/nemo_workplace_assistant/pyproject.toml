[project]
name = "nemo-workplace-assistant-agent"
description = "NeMo Gym workplace_assistant via the agent server (RunHelper)"
tags = ["nemo-gym", "agent", "tools", "multi-turn"]
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "verifiers>=0.1.11.dev1",
    "nemo-gym>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["nemo_workplace_assistant.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
