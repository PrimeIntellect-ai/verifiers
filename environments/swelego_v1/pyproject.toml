[project]
name = "swelego-v1"
version = "0.1.0"
description = "swelego-v1 — SWE-Lego real-data issue-resolving tasks (agentic; sandbox pytest reward)."
requires-python = ">=3.10"
dependencies = ["datasets"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["swelego_v1"]
