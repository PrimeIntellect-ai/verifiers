[project]
name = "openenv-wordle-v1"
version = "0.1.0"
description = "Wordle through OpenEnv's reusable Verifiers v1 taskset."
requires-python = ">=3.11"
dependencies = ["verifiers[openenv]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openenv_wordle_v1"]
