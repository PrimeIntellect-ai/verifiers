[project]
name = "rlm-skill-edit"
version = "0.1.0"
description = "Safe single-occurrence string replacement."
requires-python = ">=3.10"
dependencies = ["rlm"]

[project.scripts]
edit = "rlm.skill:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/edit"]
