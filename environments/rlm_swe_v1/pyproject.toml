[project]
name = "rlm-swe-v1"
version = "0.1.0"
description = "v1 RLM harness on Harbor coding tasks"
requires-python = ">=3.11"
dependencies = [
    "verifiers",
    "prime-sandboxes",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["rlm_swe_v1.py", "skills/**", "README.md", "pyproject.toml"]

[project.entry-points."verifiers.environments"]
rlm-swe-v1 = "rlm_swe_v1:load_environment"

[tool.uv.sources]
verifiers = { path = "../..", editable = true }
