[project]
name = "solve-swe"
version = "0.1.0"
description = "Gold-patch validation of SWE tasksets (no agent, no LLM)"
tags = ["swe", "validation", "sandbox", "no-llm", "eval"]
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.13.dev9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["solve_swe.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 30
rollouts_per_example = 1
