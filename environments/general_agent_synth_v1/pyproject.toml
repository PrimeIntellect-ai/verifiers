[project]
name = "general-agent-synth-v1"
version = "0.1.0"
description = "general-agent-synth-v1 — synthesize new general-agent tool-use tasks (bash agent in a container)."
requires-python = ">=3.11"
dependencies = ["verifiers", "general-agent-v1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["general_agent_synth_v1"]
