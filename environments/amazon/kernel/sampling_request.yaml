    dimensions:
      - dimension_id: sub_actions
        variants:
          - variant_id: qa_only
            description: Just Q&A, no reviews or shipping.
            start_world:
              - {path: task.requires_shipping, set: false}
              - {path: task.requires_reviews, set: false}
              - {path: task.requires_variants, set: false}

          - variant_id: qa_and_reviews
            description: Q&A plus reviews for thorough product investigation.
            start_world:
              - {path: task.requires_shipping, set: false}
              - {path: task.requires_reviews, set: true}
              - {path: task.requires_variants, set: false}
            min_depth_delta: 1
            max_depth_delta: 1

          - variant_id: full_investigation
            description: Q&A, reviews, and shipping — complete product investigation.
            start_world:
              - {path: task.requires_shipping, set: true}
              - {path: task.requires_reviews, set: true}
              - {path: task.requires_variants, set: false}
            min_depth_delta: 2
            max_depth_delta: 2

          - variant_id: full_with_variants
            description: Q&A, reviews, shipping, and variant checking.
            start_world:
              - {path: task.requires_shipping, set: true}
              - {path: task.requires_reviews, set: true}
              - {path: task.requires_variants, set: true}
            min_depth_delta: 3
            max_depth_delta: 3

