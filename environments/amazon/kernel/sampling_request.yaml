      - {path: p1.qa_read, set: false}
      - {path: p1.added_to_cart, set: false}
      - {path: p2.detail_read, set: false}
      - {path: p2.shipping_checked, set: false}
      - {path: p2.reviews_read, set: false}
      - {path: p2.seller_checked, set: false}
      - {path: p2.qa_read, set: false}
      - {path: p2.added_to_cart, set: false}
      - {path: p3.detail_read, set: false}
      - {path: p3.shipping_checked, set: false}
      - {path: p3.reviews_read, set: false}
      - {path: category.navigated, set: false}
      - {path: category.read, set: false}
      - {path: deals.navigated, set: false}
      - {path: deals.read, set: false}
      - {path: cart.opened, set: false}
      - {path: cart.read, set: false}
      - {path: results.compiled, set: false}
      - {path: results.submitted, set: false}
      - {path: task.entry_point, set: deals}
      - {path: task.requires_filters, set: false}
      - {path: task.requires_qa, set: false}
      - {path: task.requires_cart, set: false}
      - {path: task.requires_variants, set: false}

    dimensions:
      - dimension_id: depth_tier
        variants:
          - variant_id: surface
            description: Read deal listings only, no product detail.
            start_world:
              - {path: task.requires_detail, set: false}
              - {path: task.num_products, set: 0}

          - variant_id: with_detail
            description: Click into a deal product and read detail.
            start_world:
              - {path: task.requires_detail, set: true}
              - {path: task.num_products, set: 1}
            min_depth_delta: 3
            max_depth_delta: 2

          - variant_id: with_compare
            description: Browse deals, then compare two deal products.
            start_world:
