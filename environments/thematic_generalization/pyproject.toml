[project]
name = "thematic-generalization"
description = "Thematic generalization benchmark environment"
tags = ["reasoning", "generalization", "single-turn", "benchmark", "train", "eval"]
version = "0.1.0"
dependencies = [
    "verifiers>=0.1.9.post3",
    "datasets>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "thematic_generalization.py",
    "data/*.jsonl",
]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
