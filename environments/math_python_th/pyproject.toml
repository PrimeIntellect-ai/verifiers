[project]
name = "math-python-th"
description = "Taskset/harness math environment with a sandbox-backed Python tool."
tags = ["tool-use", "math", "sandbox", "taskset-harness", "python"]
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.9",
    "math-verify>=0.8.0",
    "prime-sandboxes>=0.2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["math_python_th.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 20
rollouts_per_example = 1
