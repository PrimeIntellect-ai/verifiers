[project]
name = "math-python-th"
description = "v1 taskset/harness math tool composition example."
tags = ["tool-use", "math", "sandbox", "taskset-harness", "python"]
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.13.dev0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["math_python_th.py", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 20
rollouts_per_example = 1
