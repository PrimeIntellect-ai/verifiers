[project]
name = "shared-runtime-v1"
version = "0.1.0"
description = "shared-runtime-v1 - two agents borrow one provisioned runtime and exchange a file-backed artifact."
requires-python = ">=3.10"
dependencies = ["verifiers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared_runtime_v1"]
