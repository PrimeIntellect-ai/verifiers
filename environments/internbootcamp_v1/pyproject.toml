[project]
name = "internbootcamp-v1"
description = "Seeded, container-isolated Verifiers v1 adapter for InternBootcamp tasks."
tags = ["reasoning", "procedural", "single-turn", "train", "eval"]
version = "0.1.0"
requires-python = ">=3.10,<3.13"
dependencies = [
    "internbootcamp @ https://github.com/dmihal/InternBootcamp/archive/2b2d388f4f056cd9bd0cc91b130f0b54b15572b4.tar.gz",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["internbootcamp_v1"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
