[project]
name = "multiswe-v1"
version = "0.1.0"
description = "multiswe-v1 - Multi-SWE-RL issue-resolving tasks (agentic; sandbox Multi-SWE reward)."
requires-python = ">=3.10"
dependencies = ["datasets", "multi-swe-bench"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["multiswe_v1.py", "extract_fix_patch.sh", "pyproject.toml"]
