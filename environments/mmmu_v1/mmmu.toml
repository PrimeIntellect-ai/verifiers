# mmmu-v1 — MMMU multimodal multiple-choice, chat-only null harness (single-turn).
# Art_Theory/validation: 30 rows, all four-option MC (the split the v0-faithful loader accepts).
#
# Lives next to the env (not in configs/) until mmmu-v1 joins the root pyproject's
# `examples` group — configs/*.toml must parse without the package installed.
#
#   uv run --with-editable environments/mmmu_v1 eval mmmu-v1 @ environments/mmmu_v1/mmmu.toml
model = "openai/gpt-5.6-luna"
num_tasks = 10

[taskset]
id = "mmmu-v1"
subset = "Art_Theory"
split = "validation"

[harness]
id = "null"

[client]
# Pin the production endpoint so a locally overridden prime `inference_url` never redirects the run.
base_url = "https://api.pinference.ai/api/v1"
