[project]
name = "general-agent-v1"
version = "0.1.0"
description = "general-agent-v1 — self-growing tool-use tasks (solver) scored by DB-hash + verify(db)."
requires-python = ">=3.11"
dependencies = ["verifiers", "pydantic", "filelock"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["general_agent_v1"]
