[project]
name = "swerebench-v2-v1"
version = "0.1.0"
description = "swerebench-v2-v1 - SWE-rebench-V2 multilingual issue-resolving tasks (agentic; sandbox parser reward)."
requires-python = ">=3.10"
dependencies = ["datasets"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["swerebench_v2_v1.py", "pyproject.toml"]
