[project]
name = "hello-endpoint-th"
version = "0.1.0"
tags = ["endpoint", "intercept", "single-turn", "taskset-harness"]
license = "Apache-2.0"
description = "Taskset/harness example for endpoint-only rollout logic."
dependencies = [
    "verifiers>=0.1.9",
    "datasets",
    "openai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["hello_endpoint_th.py", "pyproject.toml"]
