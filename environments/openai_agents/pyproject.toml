[project]
name = "openai-agents-sdk"
description = "ApiEnv environment using the OpenAI Agents SDK"
tags = ["api-env", "multi-turn", "tool-use", "openai-agents-sdk"]
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "verifiers>=0.1.12.dev3",
    "datasets",
    "openai-agents>=0.13.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["openai_agents.py"]
