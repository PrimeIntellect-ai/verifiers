[project]
name = "openenv-echo-v1"
version = "0.1.0"
description = "openenv-echo-v1 — OpenEnv MCP tools through the reusable v1 adapter."
requires-python = ">=3.11"
dependencies = ["verifiers", "tasksets"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openenv_echo_v1"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
