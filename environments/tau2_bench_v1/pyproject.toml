[project]
name = "tau2-bench-v1"
description = "Tau2's multi-domain benchmark as a native Verifiers v1 taskset and harness."
tags = ["tau2", "tool-agent-user", "tool-use", "multi-turn", "user-sim", "v1"]
version = "0.2.0"
requires-python = ">=3.11,<3.14"
dependencies = [
    "verifiers>=0.1.15.dev17",
    "audioop-lts; python_version >= '3.13'",
    "tau2 @ git+https://github.com/sierra-research/tau2-bench.git@337326e",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["tau2_bench_v1.py", "pyproject.toml"]

[tool.hatch.metadata]
allow-direct-references = true
