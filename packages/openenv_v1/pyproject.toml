[project]
name = "openenv-v1"
version = "0.1.0"
description = "Run OpenEnv environments as Verifiers v1 tasksets."
requires-python = ">=3.11"
dependencies = ["verifiers", "openenv", "httpx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openenv_v1"]
