[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "harnesses"
version = "0.1.0"
description = "Optional agent harness package for verifiers"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "verifiers",
]

[tool.hatch.build.targets.wheel]
packages = ["harnesses"]
