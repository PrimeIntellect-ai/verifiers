[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tasksets"
version = "0.1.0"
description = "Optional taskset package for verifiers"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "verifiers",
]

[tool.hatch.build.targets.wheel]
packages = ["tasksets"]

[tool.hatch.build]
include = ["tasksets/**/*", "README.md", "pyproject.toml"]
