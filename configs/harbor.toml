# harbor — Terminal-Bench 2, each task run in its own declared container image (needs docker).
# The `default` harness gives the agent the bash (+ edit) tools it drives the terminal with.
#
#   uv run eval @ configs/harbor.toml
num_tasks = 10

[taskset]
id = "harbor"
dataset = "terminal-bench/terminal-bench-2"

[harness]
id = "default"
runtime = { type = "docker" }
