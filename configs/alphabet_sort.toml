# alphabet-sort-v1 — multi-turn alphabetical sorting, driven by a colocated user simulator.
#
#   uv run eval @ configs/alphabet_sort.toml --model <small-instruct-model>
num_tasks = 5
num_rollouts = 2

[env]
max_turns = 4

[env.taskset]
id = "alphabet-sort-v1"
min_turns = 2
max_turns = 2

[env.agent.harness]
id = "null"
