# Any taskset graded by the bundled agentic judge — the multi-agent TOML shape:
# `env.id` pairs a reusable env with the taskset, and each agent is its own
# [env.<agent>] block (a partial override deep-merges into the agent's declared
# default; there is no run-level harness). By default the judge plays in the
# solver's box (--env.shared-runtime, on), so the container runtime is pinned on
# the SOLVER — the judge verifies with real execution, never on the host — and
# the judge pins only its own model off the run's.
#
#   uv run eval @ configs/agentic_judge.toml --model <model>
#
# The judge grades rubric criteria and writes {"verdicts": [...]} to
# /tmp/verdict.json in its box; the env validates it strictly and records the
# weighted mean on the solver's trace as the `judge` reward.
#
# The grading policy and what lands in the judge's box are configurable:
#   --env.task.prompt        grading-policy override: inline text or a policy
#                            file (a value ending in .md/.txt is read from
#                            disk); may reference {prompt}. The verdict
#                            contract and workspace note are always appended.
#   --env.task.rubric        criteria file (.toml/.json `criteria` list, the
#                            plugged rubric judge's format); default is the
#                            single built-in `solved` criterion. Each criterion
#                            lands as a judge/<name> metric; the judge reward
#                            is their weighted mean.
#   --env.task.trace         where the raw trace record lands in the judge's
#                            box (default /tmp/trace.json; null to omit)
#   [env.score]              task_weight (default 0) scales the taskset's own
#                            rewards; judge_weight (default 1) the verdict's
#   --env.shared-runtime     true (default): judge inspects the solver's live
#                            box; false: fresh judge box replayed to the
#                            solver's starting state
num_tasks = 2

[env]
id = "agentic-judge"

[env.taskset]
id = "gsm8k-v1"

[env.solver.harness]
id = "bash"

[env.solver.harness.runtime]
type = "docker"

[env.judge]
model = "z-ai/glm-5.2"
