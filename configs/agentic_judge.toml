# Any taskset graded by the bundled agentic judge — the multi-agent TOML shape:
# `env.id` pairs a reusable env with the taskset, and each seat is its own
# [env.<role>] block (a partial override deep-merges into the seat's declared
# default; there is no run-level harness). The judge seat pins what makes it a
# different actor: a container runtime — it verifies the solver's attempt with
# real execution, never on the host — and, here, its own model off the run's.
#
#   uv run eval @ configs/agentic_judge.toml --model <model>
#
# The judge's grading criteria are a judge plugin (`[env.spec]`, shared with the
# plugged `env.taskset.task.judges` tier); the default `score` spec asks for a
# SCORE: 0-10 verdict, recorded on the solver's trace as the `judge` reward.
num_tasks = 2

[env]
id = "agentic-judge"

[env.taskset]
id = "gsm8k-v1"

[env.solver.harness]
id = "null"

[env.judge]
model = "z-ai/glm-5.2"

[env.judge.harness.runtime]
type = "docker"
