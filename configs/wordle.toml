# wordle-v1 — the textarena taskset pinned to Wordle, driven by a user simulator.
#
#   uv run eval @ configs/wordle.toml --model <small-instruct-model>
num_tasks = 5
num_rollouts = 2

[taskset]
id = "wordle-v1"
num_tasks = 50  # pool of seeded episodes to draw the eval's tasks from

[solver]
harness = { id = "null" }
budget = { max_turns = 8 }
