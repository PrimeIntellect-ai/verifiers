# wordle-v1 — the textarena taskset pinned to Wordle, driven by a user simulator.
#
#   uv run eval @ configs/wordle.toml --model <small-instruct-model>
num_tasks = 5
num_rollouts = 2
max_turns = 8

[taskset]
id = "wordle-v1"
# The taskset generates seeded episodes forever; the eval's `num_tasks` bounds the run.

[harness]
id = "null"
