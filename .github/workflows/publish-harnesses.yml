name: Publish harnesses

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. harnesses-v0.1.0.post0)'
        required: true
        type: string
  push:
    tags:
      - "harnesses-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout tagged release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Checkout tagged release (push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSHED_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$PUSHED_REF"
          fi

          case "$TAG" in
            harnesses-v*) ;;
            *)
              echo "Release tags must be prefixed with 'harnesses-v' (received '$TAG')" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#harnesses-v}"
          FILE_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("packages/harnesses/pyproject.toml").open("rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )

          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: tag requests '$VERSION' but packages/harnesses/pyproject.toml defines '$FILE_VERSION'" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build harnesses
        run: uv build packages/harnesses

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harnesses-dist
          path: packages/harnesses/dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: harnesses-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          user: __token__
          password: ${{ secrets.PYPI_TOKEN_HARNESSES }}
