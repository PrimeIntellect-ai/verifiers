name: Dev Release

# Publishes a pre-release ("dev") build of `verifiers` to PyPI on every push to
# main. The dev version is derived from the base release in
# `verifiers/__init__.py` plus a monotonic `.dev<commit-count>` segment, so each
# push produces a unique pre-release that `pip install --pre verifiers` can pick
# up without affecting the stable `tag-and-release` flow.

on:
  push:
    branches:
      - main
    paths:
      - 'verifiers/**'
      - 'pyproject.toml'
      - '.github/workflows/dev-release.yml'
  workflow_dispatch:

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  build-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Compute and apply dev version
        id: version
        run: |
          BASE=$(python - <<'PY'
          import re
          from pathlib import Path

          match = re.search(r'__version__\s*=\s*"([^"]+)"', Path("verifiers/__init__.py").read_text())
          if not match:
              raise SystemExit("Could not find __version__ in verifiers/__init__.py")
          # Drop any pre-release/post/local segment to recover the base release.
          print(re.split(r'\.dev|\.post|\+|rc|a|b', match.group(1))[0])
          PY
          )

          # Auto-increment from the latest dev release already on PyPI for this
          # base (e.g. ...dev18 -> ...dev19); start at dev0 if none exists yet.
          NEXT=$(python - "$BASE" <<'PY'
          import json
          import re
          import sys
          import urllib.error
          import urllib.request

          base = sys.argv[1]
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/verifiers/json", timeout=30) as resp:
                  releases = json.load(resp).get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              releases = {}

          pattern = re.compile(rf"^{re.escape(base)}\.dev(\d+)$")
          nums = [int(m.group(1)) for v in releases if (m := pattern.match(v))]
          print(max(nums) + 1 if nums else 0)
          PY
          )

          DEV_VERSION="${BASE}.dev${NEXT}"

          python - "$DEV_VERSION" <<'PY'
          import re
          import sys
          from pathlib import Path

          path = Path("verifiers/__init__.py")
          updated = re.sub(
              r'__version__\s*=\s*"[^"]+"',
              f'__version__ = "{sys.argv[1]}"',
              path.read_text(),
              count=1,
          )
          path.write_text(updated)
          PY

          echo "Building dev version ${DEV_VERSION}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-dev:
    needs: build-dev
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
